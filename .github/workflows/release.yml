name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_call:
    outputs:
      release-created:
        description: Has the release been created
        value: ${{ jobs.release.outputs.release-created }}
      tag_name:
        description: Released version tag
        value: ${{ jobs.release.outputs.tag_name }}
      major-tag:
        description: Major version tag
        value: ${{ jobs.release.outputs.major-tag }}
      minor-tag:
        description: Minor version tag
        value: ${{ jobs.release.outputs.minor-tag }}
      patch-tag:
        description: Patch version tag
        value: ${{ jobs.release.outputs.patch-tag }}
      version:
        description: Version number without v prefix
        value: ${{ jobs.release.outputs.version }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release application
    runs-on: ubuntu-24.04
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      major-tag: ${{ steps.release.outputs.major }}
      minor-tag: ${{ steps.release.outputs.minor }}
      patch-tag: ${{ steps.release.outputs.patch }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    permissions:
      contents: write
      pull-requests: write
    if: >-
      ${{
        !contains(github.event.head_commit.message || '', '[skip gha]') &&
        (github.event_name != 'pull_request' || github.event.pull_request.merged == true)
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          manifest-file: .release-please-manifest.json
          config-file: >-
            ${{
              ((github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name != 'pull_request' && github.ref_name == 'main'))
              && 'release-please-config-release.json'
            }}
